version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: webte_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db
    networks:
      - webte

  web:
    image: nginx:stable-alpine
    container_name: webte_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - webte

  db:
    image: mariadb:11
    container_name: webte_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: webte_cas
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: webte
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - webte

networks:
  webte:

volumes:
  db_data: